name: Release

on:
  push:
    tags:
      - 'v*'  # se activa solo con tags tipo v1.0.0, v1.2.3, etc.

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            artifact: Lupex-Linux-VST3
          - os: windows-latest
            name: Windows
            artifact: Lupex-Windows-VST3

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfreetype-dev \
            libfontconfig-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev \
            ninja-build

      - name: Configure (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Zip artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd build/Lupex_artefacts/Release/VST3
          zip -r ${{ matrix.artifact }}.zip Lupex.vst3

      - name: Zip artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path build/Lupex_artefacts/Release/VST3/Lupex.vst3 -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Lupex_artefacts/Release/VST3/${{ matrix.artifact }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}